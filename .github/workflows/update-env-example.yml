name: update-env-example

on:
  push:
    branches: [main]
    paths:
      - src/env.ts
      - src/env-schema.ts
      - scripts/generate-default-env.ts

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: write env.example
        run: |
          bun run env > .env.example.new
          if [ ! -f .env.example ] || ! diff -q .env.example .env.example.new > /dev/null 2>&1; then
            mv .env.example.new .env.example
            echo "Updated .env.example"
          else
            rm .env.example.new
          fi

      - name: commit env.example
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .env.example
          git diff --staged --quiet || git commit -m "chore: update .env.example"

      - name: push
        run: |
          git push
